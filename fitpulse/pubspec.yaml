name: fitpulse
description: FitPulse - App de fitness para gimnasios
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^13.0.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  permission_handler: ^11.3.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
