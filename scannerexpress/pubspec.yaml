name: scannerexpress
description: Escanea documentos, genera PDFs y organiza tu vida.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_mlkit_document_scanner: ^0.1.0
  google_mlkit_text_recognition: ^0.13.0
  pdf: ^3.11.0
  pdfx: ^2.6.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  in_app_purchase: ^3.2.0
  share_plus: ^10.0.0
  uuid: ^4.5.0
  shared_preferences: ^2.3.0
  connectivity_plus: ^6.0.0
  intl: ^0.20.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.3.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0071e3"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
