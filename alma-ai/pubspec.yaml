name: alma_ai
description: Compañero emocional personal con IA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Local cache (offline-first)
  hive_flutter: ^1.1.0

  # HTTP
  http: ^1.2.2

  # Location
  geolocator: ^13.0.1

  # Image picker (avatar)
  image_picker: ^1.1.2

  # Intl (i18n)
  intl: ^0.20.0

  # URL launcher (crisis resources)
  url_launcher: ^6.3.0

  # Lottie (animations)
  lottie: ^3.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
